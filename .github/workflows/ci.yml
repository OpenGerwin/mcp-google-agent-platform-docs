name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Verify package imports
        run: |
          uv run python -c "
          from mcp_google_agent_platform_docs.server import mcp
          from mcp_google_agent_platform_docs.source import load_sources
          from mcp_google_agent_platform_docs.cache import CacheManager
          from mcp_google_agent_platform_docs.discovery import StructureDiscovery
          from mcp_google_agent_platform_docs.fetcher import PageFetcher
          from mcp_google_agent_platform_docs.search import SearchEngine
          from mcp_google_agent_platform_docs import config
          sources = load_sources()
          assert len(sources) == 2, f'Expected 2 sources, got {len(sources)}'
          assert 'geap' in sources
          assert 'vertex-ai' in sources
          print(f'All imports OK, {len(sources)} sources loaded')
          "

      - name: Verify CLI entrypoint
        run: uv run mcp-google-agent-platform-docs --help || true
